<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kişisel Web Sayfam</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Header Section -->
    <header class="header">
        <h1 class="main-title">Sayfama Hoşgeldiniz</h1>
        
        <!-- Colorful Subtitle -->
        <div class="subtitle-container">
            <span class="subtitle-char" style="color: #FF6B6B;">H</span>
            <span class="subtitle-char" style="color: #4ECDC4;">a</span>
            <span class="subtitle-char" style="color: #45B7D1;">k</span>
            <span class="subtitle-char" style="color: #FFA07A;">k</span>
            <span class="subtitle-char" style="color: #98D8C8;">ı</span>
            <span class="subtitle-char" style="color: #F7DC6F;">m</span>
            <span class="subtitle-char" style="color: #BB8FCE;">d</span>
            <span class="subtitle-char" style="color: #85C1E2;">a</span>
            <span class="subtitle-char" style="color: #F8B88B;">k</span>
            <span class="subtitle-char" style="color: #52C4A1;">i</span>
            <span class="subtitle-char" style="color: transparent;"> </span>
            <span class="subtitle-char" style="color: #FF6B6B;">H</span>
            <span class="subtitle-char" style="color: #4ECDC4;">e</span>
            <span class="subtitle-char" style="color: #45B7D1;">r</span>
            <span class="subtitle-char" style="color: #FFA07A;">ş</span>
            <span class="subtitle-char" style="color: #98D8C8;">e</span>
            <span class="subtitle-char" style="color: #F7DC6F;">y</span>
        </div>

        <!-- Heart Icon -->
        <div class="heart-icon">❤️</div>
    </header>

    <!-- Cards Grid -->
    <main class="container">
        <div class="cards-grid" id="cardsGrid">
            <!-- Cards will be generated by JavaScript -->
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <p>Benim kişisel web sayfamıza hoşgeldiniz ✨</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
